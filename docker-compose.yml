services:

  # Local dev server for viewing the site and generated document output
  server:
    build: .
    volumes:
      - .:/app
    ports:
      - "9000:9000"
    command: sh -c "julia --project=. -e 'using Pkg; Pkg.instantiate()' && julia --project=. serv.jl 9000"
    environment:
      - PYTHONUNBUFFERED=1


  # Cloudflare Tunnel for exposing the web server securely
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - server
